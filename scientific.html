<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InstantCalc.net | Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <div class="logo">InstantCalc<span>.net</span></div>
        <div class="tagline">Fast, reliable online calculators</div>
      </div>
      <nav class="main-nav">
        <a href="index.html#math">Math</a>
        <a href="index.html#finance">Finance</a>
        <a href="index.html#health">Health</a>
        <a href="index.html#other">Other</a>
      </nav>
      
      <div class="search-wrap">
        <input id="site-search" class="search-input" type="search" placeholder="Search calculators" aria-label="Search calculators" />
      </div>
<div class="ad-slot header-ad" aria-label="Advertisement">Ad Space</div>
    </header>

    <main>
      <section class="calc-page">
        <div class="page-header">
          <h2>Scientific Calculator</h2>
          <p>Full scientific keypad with trig, logs, powers, and constants.</p>
        </div>
        <div class="calc-layout">
          <div class="calculator">
            <!-- Scientific calculator UI based on MIT-licensed code by Yogesh Agarwala; see THIRD_PARTY_NOTICES.txt -->
            <div class="scicalc">
              <textarea id="history" rows="3" class="scicalc-history" readonly></textarea>
              <div class="scicalc-display">
                <input id="expression1" type="text" readonly class="scicalc-input" />
                <div id="sci-live-result" class="scicalc-live">0</div>
              </div>
              <div class="scicalc-grid" aria-label="Scientific calculator keypad">
                <div class="scicalc-row">
                  <button class="scicalc-btn scicalc-fn" onclick="answer()">Ans</button>
                  <button class="scicalc-btn scicalc-fn" onclick="sinfn()">sin</button>
                  <button class="scicalc-btn scicalc-fn" onclick="cosfn()">cos</button>
                  <button class="scicalc-btn scicalc-fn" onclick="tanfn()">tan</button>
                  <button class="scicalc-btn scicalc-fn" onclick="logfn()">log</button>
                  <button class="scicalc-btn scicalc-fn" onclick="lnfn()">ln</button>
                </div>
                <div class="scicalc-row">
                  <button class="scicalc-btn scicalc-fn" onclick="pi()">π</button>
                  <button class="scicalc-btn scicalc-fn" onclick="e()">e</button>
                  <button class="scicalc-btn scicalc-fn" onclick="squareroot()">√</button>
                  <button class="scicalc-btn scicalc-fn" onclick="power()">xʸ</button>
                  <button class="scicalc-btn scicalc-fn" onclick="square()">x²</button>
                  <button class="scicalc-btn scicalc-fn" onclick="abs()">|x|</button>
                </div>
                <div class="scicalc-row">
                  <button class="scicalc-btn scicalc-fn" onclick="display1('(')">(</button>
                  <button class="scicalc-btn scicalc-fn" onclick="display1(')')">)</button>
                  <button class="scicalc-btn scicalc-fn" onclick="percentage()">%</button>
                  <button class="scicalc-btn scicalc-fn" onclick="exp()">EXP</button>
                  <button class="scicalc-btn scicalc-op" onclick="allclr()">C</button>
                  <button class="scicalc-btn scicalc-op" onclick="back()">⌫</button>
                </div>
                <div class="scicalc-row scicalc-row-4">
                  <button class="scicalc-btn scicalc-num" onclick="display1('7')">7</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('8')">8</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('9')">9</button>
                  <button class="scicalc-btn scicalc-op" onclick="display1('/')">÷</button>
                </div>
                <div class="scicalc-row scicalc-row-4">
                  <button class="scicalc-btn scicalc-num" onclick="display1('4')">4</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('5')">5</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('6')">6</button>
                  <button class="scicalc-btn scicalc-op" onclick="multiply()">×</button>
                </div>
                <div class="scicalc-row scicalc-row-4">
                  <button class="scicalc-btn scicalc-num" onclick="display1('1')">1</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('2')">2</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('3')">3</button>
                  <button class="scicalc-btn scicalc-op" onclick="display1('-')">−</button>
                </div>
                <div class="scicalc-row scicalc-row-4">
                  <button class="scicalc-btn scicalc-num" onclick="display1('0')">0</button>
                  <button class="scicalc-btn scicalc-num" onclick="display1('.')">.</button>
                  <button class="scicalc-btn scicalc-fn" onclick="answer()">Ans</button>
                  <button class="scicalc-btn scicalc-op" onclick="display1('+')">+</button>
                </div>
                <div class="scicalc-row scicalc-row-4">
                  <span class="scicalc-spacer"></span>
                  <span class="scicalc-spacer"></span>
                  <span class="scicalc-spacer"></span>
                  <button class="scicalc-btn scicalc-eq" onclick="runtwofunction()">=</button>
                </div>
              </div>
            </div>
          </div>
          <aside class="sidebar">
            <div class="ad-slot sidebar-ad" aria-label="Advertisement">Ad Space</div>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-copy">© 2026 InstantCalc.net. All rights reserved.</div>
    </footer>

    <script src="scicalc-vendor.js"></script>
    <script src="script.js"></script>
  </body>
</html>
