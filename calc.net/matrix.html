<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InstantCalc.net | Matrix Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <div class="logo">InstantCalc<span>.net</span></div>
        <div class="tagline">Fast, reliable online calculators</div>
      </div>
      <nav class="main-nav">
        <a href="index.html#math">Math</a>
        <a href="index.html#finance">Finance</a>
        <a href="index.html#health">Health</a>
        <a href="index.html#other">Other</a>
      </nav>
      
      <div class="search-wrap">
        <input id="site-search" class="search-input" type="search" placeholder="Search calculators" aria-label="Search calculators" />
      </div>
<div class="ad-slot header-ad" aria-label="Advertisement">Ad Space</div>
    </header>

    <main>
      <section class="calc-page">
        <div class="page-header">
          <h2>Matrix Calculator (2×2)</h2>
          <p>Add or multiply two 2×2 matrices.</p>
        </div>
        <div class="form-card">
          <div class="form-grid">
            <label>
              A11
              <input id="mat-a11" type="number" step="0.01" placeholder="1" />
            </label>
            <label>
              A12
              <input id="mat-a12" type="number" step="0.01" placeholder="2" />
            </label>
            <label>
              A21
              <input id="mat-a21" type="number" step="0.01" placeholder="3" />
            </label>
            <label>
              A22
              <input id="mat-a22" type="number" step="0.01" placeholder="4" />
            </label>
          </div>
          <div class="form-grid">
            <label>
              B11
              <input id="mat-b11" type="number" step="0.01" placeholder="5" />
            </label>
            <label>
              B12
              <input id="mat-b12" type="number" step="0.01" placeholder="6" />
            </label>
            <label>
              B21
              <input id="mat-b21" type="number" step="0.01" placeholder="7" />
            </label>
            <label>
              B22
              <input id="mat-b22" type="number" step="0.01" placeholder="8" />
            </label>
          </div>
          <label>
            Operation
            <select id="mat-op">
              <option value="add">Add</option>
              <option value="mul">Multiply</option>
            </select>
          </label>
          <button id="mat-calc" class="btn primary" type="button">Calculate</button>
          <div id="mat-output" class="result-box">Result matrix will appear here.</div>
        </div>
        <div class="ad-slot inline-ad" aria-label="Advertisement">Ad Space</div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-copy">© 2026 InstantCalc.net. All rights reserved.</div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
