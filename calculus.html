<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InstantCalc.net | Calculus Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <div class="logo">InstantCalc<span>.net</span></div>
        <div class="tagline">Fast, reliable online calculators</div>
      </div>
      <nav class="main-nav">
        <a href="index.html#math">Math</a>
        <a href="index.html#finance">Finance</a>
        <a href="index.html#health">Health</a>
        <a href="index.html#other">Other</a>
      </nav>
      
      <div class="search-wrap">
        <input id="site-search" class="search-input" type="search" placeholder="Search calculators" aria-label="Search calculators" />
      </div>
<div class="ad-slot header-ad" aria-label="Advertisement">Ad Space</div>
    </header>

    <main>
      <section class="calc-page">
        <div class="page-header">
          <h2>Derivative / Limit / Integral Calculator</h2>
          <p>Numeric calculus using f(x). Example: sin(x) + x^2</p>
        </div>
        <div class="form-card">
          <label>
            Function f(x)
            <input id="calc-fx" class="fx-input" type="text" placeholder="sin(x) + x^2" />
          </label>
          <div class="display" aria-live="polite">
            <div id="calc-expression" class="display-expression"></div>
            <div id="calc-result" class="display-result">0</div>
          </div>
          <div class="calc-mini-controls">
            <button class="btn" data-calc-action="clear">C</button>
            <button class="btn" data-calc-action="backspace">⌫</button>
            <button class="btn" data-calc-action="paren" data-calc-value="(">(</button>
            <button class="btn" data-calc-action="paren" data-calc-value=")">)</button>
          </div>
          <div class="calc-keypad" aria-label="Calculus keypad">
            <button class="btn fn" data-calc-fn="sin">sin</button>
            <button class="btn fn" data-calc-fn="cos">cos</button>
            <button class="btn fn" data-calc-fn="tan">tan</button>
            <button class="btn fn" data-calc-fn="log">log</button>
            <button class="btn fn" data-calc-fn="ln">ln</button>
            <button class="btn fn" data-calc-fn="sqrt">√</button>
            <button class="btn" data-calc-value="x">x</button>
            <button class="btn" data-calc-op="^">xʸ</button>
            <button class="btn" data-calc-const="pi">π</button>
            <button class="btn" data-calc-const="e">e</button>
            <button class="btn" data-calc-op="+">+</button>
            <button class="btn" data-calc-op="-">−</button>
            <button class="btn" data-calc-value="7">7</button>
            <button class="btn" data-calc-value="8">8</button>
            <button class="btn" data-calc-value="9">9</button>
            <button class="btn" data-calc-op="*">×</button>
            <button class="btn" data-calc-value="4">4</button>
            <button class="btn" data-calc-value="5">5</button>
            <button class="btn" data-calc-value="6">6</button>
            <button class="btn" data-calc-op="/">÷</button>
            <button class="btn" data-calc-value="1">1</button>
            <button class="btn" data-calc-value="2">2</button>
            <button class="btn" data-calc-value="3">3</button>
            <button class="btn" data-calc-value="0">0</button>
            <button class="btn" data-calc-value=".">.</button>
            <button class="btn" data-calc-const="ans">Ans</button>
          </div>
          <div class="form-grid">
            <label>
              Evaluate at x
              <input id="calc-x" type="number" step="0.001" placeholder="1" />
            </label>
            <label>
              Step (h)
              <input id="calc-h" type="number" step="0.0001" placeholder="0.001" />
            </label>
            <label>
              Lower bound (a)
              <input id="calc-a" type="number" step="0.001" placeholder="0" />
            </label>
            <label>
              Upper bound (b)
              <input id="calc-b" type="number" step="0.001" placeholder="1" />
            </label>
          </div>
          <button id="calc-derivative" class="btn primary" type="button">Derivative</button>
          <button id="calc-limit" class="btn primary" type="button">Limit</button>
          <button id="calc-integral" class="btn primary" type="button">Integral</button>
          <div id="calc-output" class="result-box">Result will appear here.</div>
        </div>
        <div class="ad-slot inline-ad" aria-label="Advertisement">Ad Space</div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-copy">© 2026 InstantCalc.net. All rights reserved.</div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
